repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace

# Run ruff via uv so the hook uses the exact version from the lockfile,
# matching what GitHub CI runs with `uv run ruff check/format`.
-   repo: local
    hooks:
    -   id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        pass_filenames: false  # let ruff discover files so pyproject.toml exclude= is honoured
        types: [python]
    -   id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        pass_filenames: false  # same reason
        types: [python]
    -   id: mypy
        name: mypy
        entry: uv run mypy src/veriforge/ veriforge_lsp/
        language: system
        pass_filenames: false
        types: [python]
